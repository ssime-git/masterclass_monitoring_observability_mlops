server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: [localhost]
        labels:
          service: gateway
          __path__: /var/log/masterclass/gateway.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: trace_id
            span_id: span_id
            request_id: request_id
            user_id: user_id
            session_id: session_id
      - labels:
          level:
          trace_id:
          request_id:

  - job_name: model-service
    static_configs:
      - targets: [localhost]
        labels:
          service: model-service
          __path__: /var/log/masterclass/model-service.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            trace_id: trace_id
            span_id: span_id
            request_id: request_id
            user_id: user_id
            session_id: session_id
      - labels:
          level:
          trace_id:
          request_id:

  - job_name: nginx
    static_configs:
      - targets: [localhost]
        labels:
          service: nginx
          __path__: /var/log/masterclass/nginx/access.log
    pipeline_stages:
      - json:
          expressions:
            status: status
            request_id: request_id
            request_uri: request_uri
      - labels:
          status:
          request_id:
