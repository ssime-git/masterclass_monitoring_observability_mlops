global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8000"]

  - job_name: model-service
    metrics_path: /metrics
    static_configs:
      - targets: ["model-service:8001"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
