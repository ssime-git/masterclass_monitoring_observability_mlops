services:
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    environment:
      APP_NAME: gateway
      DATABASE_URL: sqlite:////app/data/masterclass.db
      MODEL_SERVICE_URL: http://model-service:8001
      SESSION_TTL_MINUTES: 90
      LOG_FILE_PATH: /app/logs/gateway.log
      OTEL_EXPORTER_ENDPOINT: http://otel-collector:4318
      SERVICE_VERSION: 0.1.0
      MODEL_VERSION: keyword-v1
    volumes:
      - ./data:/app/data
      - ./data/logs:/app/logs
    depends_on:
      - model-service
      - otel-collector
    expose:
      - "8000"

  model-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.model
    environment:
      APP_NAME: model-service
      INFERENCE_DELAY_SECONDS: 0.0
      LOG_FILE_PATH: /app/logs/model-service.log
      OTEL_EXPORTER_ENDPOINT: http://otel-collector:4318
      SERVICE_VERSION: 0.1.0
      MODEL_VERSION: keyword-v1
    volumes:
      - ./data/logs:/app/logs
    depends_on:
      - otel-collector
    expose:
      - "8001"

  streamlit-ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    environment:
      PUBLIC_API_URL: http://nginx:8080
      GRAFANA_PUBLIC_URL: http://localhost:3000
      TEMPO_API_URL: http://tempo:3200
    depends_on:
      - nginx
    ports:
      - "8501:8501"
    volumes:
      - ./src:/app/src:ro

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - gateway
    ports:
      - "8080:8080"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/logs/nginx:/var/log/nginx

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.2
    command:
      - --nginx.scrape-uri=http://nginx:8080/nginx_status
    depends_on:
      - nginx
    expose:
      - "9113"

  prometheus:
    image: prom/prometheus:v3.3.0
    depends_on:
      - gateway
      - model-service
      - nginx-exporter
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus

  grafana:
    image: grafana/grafana:11.6.0
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./data/grafana/grafana.db:/var/lib/grafana/grafana.db

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    command:
      - --config=/etc/otelcol-contrib/config.yaml
    expose:
      - "4318"
    volumes:
      - ./docker/otel/collector.yaml:/etc/otelcol-contrib/config.yaml:ro

  tempo:
    image: grafana/tempo:2.7.1
    command:
      - -config.file=/etc/tempo/config.yml
    expose:
      - "3200"
      - "4318"
    volumes:
      - ./docker/tempo/tempo.yaml:/etc/tempo/config.yml:ro
      - ./data/tempo:/tmp/tempo

  loki:
    image: grafana/loki:3.4.2
    command:
      - -config.file=/etc/loki/config.yml
    expose:
      - "3100"
    volumes:
      - ./docker/loki/loki.yaml:/etc/loki/config.yml:ro
      - ./data/loki:/loki

  promtail:
    image: grafana/promtail:3.4.2
    command:
      - -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    volumes:
      - ./docker/promtail/promtail.yaml:/etc/promtail/config.yml:ro
      - ./data/logs:/var/log/masterclass:ro
